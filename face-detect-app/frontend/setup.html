<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>配网设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #FBF9F4;
            color: #211F1C;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px;
            -webkit-font-smoothing: antialiased;
        }
        h1 {
            font-size: 1.2rem;
            color: #211F1C;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #6F6A62;
            margin-bottom: 28px;
        }

        .qr-card {
            background: #FFFFFF;
            border: 1px solid #E8E2D8;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 1px 2px rgba(33,31,28,0.04), 0 2px 8px rgba(33,31,28,0.03);
            text-align: center;
            width: 100%;
            max-width: 340px;
            margin-bottom: 20px;
        }
        .qr-card h2 {
            font-size: 1rem;
            color: #211F1C;
            margin-bottom: 16px;
        }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            margin: 0 auto 16px;
            background: #F4F1EB;
            border: 1px solid #E8E2D8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: #A8A29A;
        }
        .qr-placeholder img, .qr-placeholder canvas {
            width: 200px;
            height: 200px;
            border-radius: 8px;
        }
        .server-url-display {
            background: #F4F1EB;
            border: 1px solid #E8E2D8;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #CC785C;
            word-break: break-all;
            margin-top: 8px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 20px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E8E2D8;
        }
        .divider span {
            font-size: 0.8rem;
            color: #6F6A62;
        }

        .manual-card {
            background: #FFFFFF;
            border: 1px solid #E8E2D8;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(33,31,28,0.04), 0 2px 8px rgba(33,31,28,0.03);
            width: 100%;
            max-width: 340px;
            margin-bottom: 20px;
        }
        .manual-card label {
            display: block;
            font-size: 0.85rem;
            color: #6F6A62;
            margin-bottom: 8px;
        }
        .manual-card input::placeholder {
            color: #A8A29A;
        }
        .manual-card input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #E8E2D8;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #211F1C;
            background: #FBF9F4;
            font-family: monospace;
        }
        .manual-card input:focus {
            outline: none;
            border-color: #CC785C;
            background: white;
        }

        .btn {
            width: 100%;
            max-width: 340px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #CC785C;
            color: white;
            box-shadow: 0 2px 8px rgba(204,120,92,0.28);
        }
        .btn-primary:hover { background: #B86A4F; }
        .btn-primary:disabled {
            background: #D9D2C6;
            box-shadow: none;
            cursor: not-allowed;
            color: #FFFFFF;
        }

        .error-msg {
            color: #C0392B;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>配网设置</h1>
    <p class="subtitle">扫码或手动输入电脑的服务器地址</p>

    <!-- 扫码区域 -->
    <div class="qr-card">
        <h2>方式一：扫码连接</h2>
        <div class="qr-placeholder" id="qrContainer">
            正在获取服务器地址...
        </div>
        <div class="server-url-display" id="serverUrlDisplay">--</div>
    </div>

    <div class="divider"><span>或者</span></div>

    <!-- 手动输入 -->
    <div class="manual-card">
        <label for="manualUrl">方式二：手动输入地址</label>
        <input type="text" id="manualUrl" placeholder="http://server-ip:8000 或 http://公网IP/face/" />
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <button class="btn btn-primary" id="connectBtn" disabled onclick="connect()">
        连接
    </button>

    <script>
        let serverUrl = '';

        // 使用 QR Server API 生成二维码图片
        function showQR(text) {
            const container = document.getElementById('qrContainer');
            const size = 200;
            const encoded = encodeURIComponent(text);
            const img = document.createElement('img');
            // 注意：二维码前景色必须用黑色（000000），低对比度的彩色（如 CC785C）
            // 会导致手机端 ZXing 扫码器无法识别，表现为"扫码没反应"
            img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encoded}&bgcolor=ffffff&color=000000`;
            img.alt = 'QR Code';
            img.onerror = () => {
                container.innerHTML = `<div style="text-align:center;padding:20px;font-size:0.85rem;">二维码加载失败<div style="font-size:0.75rem;margin-top:4px;color:#6F6A62;">请使用下方手动输入</div></div>`;
            };
            img.onload = () => {
                container.innerHTML = '';
                container.appendChild(img);
            };
            container.innerHTML = '';
            container.appendChild(img);
        }

        async function init() {
            try {
                const resp = await fetch('./api/server-info');
                if (!resp.ok) throw new Error('Failed');
                const data = await resp.json();
                serverUrl = data.url;
                document.getElementById('serverUrlDisplay').textContent = serverUrl;
                showQR(serverUrl);
                document.getElementById('manualUrl').value = serverUrl;
                document.getElementById('connectBtn').disabled = false;
            } catch (e) {
                document.getElementById('qrContainer').innerHTML =
                    '<div style="text-align:center;padding:20px;font-size:0.85rem;">无法获取服务器地址<br><span style="font-size:0.75rem;color:#6F6A62;">请手动输入下方地址</span></div>';
                document.getElementById('connectBtn').disabled = false;
            }
        }

        function connect() {
            let url = document.getElementById('manualUrl').value.trim();
            const errEl = document.getElementById('errorMsg');

            if (!url) {
                errEl.textContent = '请输入服务器地址';
                errEl.style.display = 'block';
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'http://' + url;
            }
            if (!url.endsWith('/')) url += '/';

            // 尝试连接验证
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('connectBtn').textContent = '连接中...';
            errEl.style.display = 'none';

            fetch(url + 'api/health')
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'ok') {
                        // 保存到 localStorage，供 Android WebView 读取
                        localStorage.setItem('server_url', url);
                        // 触发 Android 桥接
                        if (window.AndroidBridge && AndroidBridge.onServerUrlSet) {
                            AndroidBridge.onServerUrlSet(url);
                        }
                        document.getElementById('connectBtn').textContent = '已连接';
                        document.getElementById('connectBtn').style.background = '#3E8E5E';
                    } else {
                        throw new Error('服务异常');
                    }
                })
                .catch(err => {
                    errEl.textContent = '连接失败：' + err.message + '，请检查地址是否正确';
                    errEl.style.display = 'block';
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('connectBtn').textContent = '连接';
                });
        }

        // 回车触发连接
        document.getElementById('manualUrl').addEventListener('keydown', e => {
            if (e.key === 'Enter') connect();
        });

        init();
    </script>
</body>
</html>
